<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#00ff88"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Triangle edges -->
  <line x1="32" y1="10" x2="10" y2="50" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="32" y1="10" x2="54" y2="50" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="10" y1="50" x2="54" y2="50" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Nodes -->
  <circle cx="32" cy="10" r="5" fill="#0a0e17" stroke="url(#g)" stroke-width="2.5" filter="url(#glow)"/>
  <circle cx="10" cy="50" r="5" fill="#0a0e17" stroke="url(#g)" stroke-width="2.5" filter="url(#glow)"/>
  <circle cx="54" cy="50" r="5" fill="#0a0e17" stroke="url(#g)" stroke-width="2.5" filter="url(#glow)"/>
  <!-- Inner dots -->
  <circle cx="32" cy="10" r="2" fill="#00d4ff"/>
  <circle cx="10" cy="50" r="2" fill="#00ff88"/>
  <circle cx="54" cy="50" r="2" fill="#00d4ff"/>
</svg>
